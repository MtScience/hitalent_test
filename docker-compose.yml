version: "3.8"

services:
  server:
    network_mode: host
    container_name: server
    environment:
      POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    command: poetry run uvicorn main:app --port 8000 --host 0.0.0.0
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: server
    restart: always
    init: true
    depends_on:
      - db

  db:
    image: postgres:16.13
    container_name: database
    restart: always
    environment:
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - .data/db:/var/lib/postgresql/data
